name: Quality Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality_gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run type-check
      - run: npm test
      - run: npm run lint
      - run: npm run ui:gds:check
      - run: npm run build
